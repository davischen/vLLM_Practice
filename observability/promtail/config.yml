server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: vllm-serve
    static_configs:
      - targets:
          - localhost
        labels:
          job: vllm-serve
          app: vllm-practice
          component: vllm-serving
          __path__: /var/log/vllm-practice/vllm/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            model: model
            request_id: request_id
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          event:
          model:
